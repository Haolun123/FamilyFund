services:
  familyfund:
    build: .
    container_name: familyfund
    ports:
      - "8501:8501"
      - "127.0.0.1:5174:5174"   # MCP SSE，只绑本机
    volumes:
      - ${FAMILYFUND_DATA:-./data}:/app/data
      - ./src:/app/src
      - ./dashboard:/app/dashboard
    environment:
      - FINANCE_REPORTS_HOST_DIR=${FAMILYFUND_DATA:-./data}/Finance Reports
    restart: unless-stopped
